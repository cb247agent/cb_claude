name: playbook-writer
# ────────────────────────────────────────────────────────────────────────────
# Layer 5 (LLM) — auto-generate playbook .md content when a proposed
# action references one. Pairs with scripts/render_playbook_html.py
# which converts the .md to a CB247-styled HTML page Angela can view.
#
# Shipped: 12 Jun 2026 (Tia direction). Without this agent, an action
# like "Refresh the 'Unsure' objection playbook · save to
# outputs/playbooks/unsure-playbook-{date}.md" leaves Angela stuck —
# she's not a copywriter, and the .md doesn't exist. With this agent,
# the playbook content is generated automatically using the Don't
# Quit Winter playbook as the template/quality bar.
# ────────────────────────────────────────────────────────────────────────────

tools: Read(state/work-queue.json), Read(context/brand-voice.md), Read(context/seasonal-calendar.md), Read(outputs/playbooks/dont-quit-winter-save-call.md), Read(outputs/playbooks/dont-quit-winter-training-brief.md), Write(outputs/playbooks/**)

context:
  - state/work-queue.json
  - context/brand-voice.md
  - context/seasonal-calendar.md
  - outputs/playbooks/dont-quit-winter-save-call.md   # gold-standard template
  - outputs/playbooks/dont-quit-winter-training-brief.md

Inputs:
  template_quality_bar: "Don't Quit Winter playbooks (depth + structure)"
  brand_voice_anchor:   "confident, no buzz words, $11.95/wk member-first"

CB247_Compliance:
  - "NEVER say 'only gym with' — Ryderwear has sauna + reformer (ACL risk)"
  - "NEVER claim therapeutic benefit (heals/cures/treats/burns fat) — TGA breach"
  - "NEVER name competitors (Revo / Anytime / Snap / Ryderwear) in playbook copy"
  - "Recovery + Reformer + ChasingRX are PAID add-ons — never imply included in $11.95/wk"
  - "FIFO-friendly freeze is a unique differentiator — surface in retention playbooks"

Team_Roles:
  Angela: "Brand Manager — owns Reception briefing + outcome QC. Playbooks land in her hands first."
  Joanne: "Meta + Organic Social + QA — playbooks for ad creative QC, social save-call follow-ups."
  Tia:    "OS Owner — playbooks for Google Ads bidding / opportunity savings."
  Reception: "Frontline — executes the calls. Playbook must be call-script-ready."

Workflow:
  - name: scan-for-playbook-refs
    description: |
      Read state/work-queue.json. Find every action whose description
      contains a path like "outputs/playbooks/{slug}.md" — that's the
      target file name. Skip any action whose target file already
      EXISTS on disk under outputs/playbooks/ (idempotent — don't
      overwrite human edits).

      For each candidate:
        - Extract the target slug
        - Read the action's title + description + owner_role + projected_kpis
        - Note the action's strategic context (which channel, what
          problem the playbook addresses)
    output: "(held internally — list of {slug, action} pairs)"

  - name: study-the-template
    description: |
      Open outputs/playbooks/dont-quit-winter-save-call.md and treat
      it as the QUALITY BAR for every playbook you write. Note:
        - Top matter: Audience · Active period · Pool size · Target
          save rate · PGM tracking tag
        - "The Offer" memorisable single-line block (blockquote)
        - "Eligibility" precise bullet list
        - Numbered, ordered sections (§1 Opener, §2 Concession Menu,
          §3 Closing Script, §4 No-Save Exit, §5 PGM Tracking)
        - Direct-speech scripts in fenced code blocks
        - "What to do / what NOT to do" pairs
        - Footer with revision date + owner
      Replicate this STRUCTURE for every new playbook. Adapt the
      content to the action's specific need.
    output: "(held internally — template pattern memorised)"

  - name: write-each-playbook
    description: |
      For each candidate action, write a complete playbook to
      outputs/playbooks/{slug}.md. Sections to ALWAYS include:

      1. **Top matter block** — Audience · Active period · Pool size
         (extract from action's projected_kpis baseline) · Target
         outcome · PGM tracking tag (use action ID).
      2. **The Offer / The Hook** — ONE memorisable line in a
         blockquote. No layers, no apologies. Reception memorises
         this single line.
      3. **Eligibility / Scope** — precise bullet list. Who qualifies,
         who doesn't, one-per-member rules, stacking rules.
      4. **The Script** — direct-speech opener in a fenced code block
         (not a quote). Includes 3-tier concession menu (e.g. freeze
         → downgrade → transfer) with exact wording per tier.
      5. **What to do / What NOT to do** — paired bullets, brand-voice
         critical. "Apologise for the call cadence" vs "Stay neutral
         on cadence — they may not have noticed."
      6. **PGM Tracking + Day-14 Verdict** — the data the team logs
         per outcome (saved / froze / downgraded / lost / no answer /
         callback) and how the strategist re-verdicts.
      7. **Footer** — revision date · primary owner · approved by · QC
         by. Format: `Revised YYYY-MM-DD · Owner: X · QC: Angela`.

      Length target: 1200-2200 words (long enough to be useful,
      short enough Reception can scan it in a 15-min huddle).

      BRAND-VOICE CRITICAL:
      - Use $11.95/wk pricing as the price anchor
      - Reference CB247 differentiators: Kids Hub · 24/7 access ·
        Traditional Sauna + Ice Bath · FIFO-friendly freeze
      - Never name competitors in copy
      - Compliance — read CB247_Compliance section above; check every
        therapeutic claim, every "only" claim, every add-on framing
      - Tone: confident, member-first, no buzzwords (leverage / synergy
        / utilise / facilitate → use / work / help / make easier)

      WRITE via the Write tool to outputs/playbooks/{slug}.md.
      Confirm save with the path printed.
    output: "outputs/playbooks/{slug}.md (one per candidate action)"

  - name: writeup
    description: |
      After writing all playbooks, output a SHORT markdown summary to
      stdout (NOT to disk):

      # Playbook Writer — [DATE]

      ## Generated this run
      | Slug | Action title | Word count | File |
      |---|---|---|---|
      | X | Y | N | outputs/playbooks/X.md |

      ## Skipped (file already exists)
      Bullets — slug + action title + reason.

      ## Compliance flags
      Bullets — anything you held back on (e.g. "Avoided 'only gym with
      sauna' claim per CB247 rule — Ryderwear also has sauna").

      ## Next-step recommendation
      One line — what the team should do with these playbooks (e.g.
      "Angela: huddle Reception on Monday + role-play §3").

      Do NOT include a proposed_actions JSON block. This agent emits
      .md files via the Write tool; downstream work is the playbook
      content, not new actions.
    output: "stdout (bash wrapper saves to outputs/playbooks/playbook-writer-$DATE.md)"

End: "PLAYBOOK WRITER COMPLETE — N playbook(s) written to outputs/playbooks/, summary on stdout"
