name: trend-ride-drafter
# ────────────────────────────────────────────────────────────────────────────
# Layer 5 (LLM) — Path F · AI Trend-Ride Drafter.
#
# WHY THIS EXISTS (13 Jun 2026 — Tia)
#   "Don't give Joanne a directive. Give her a post + shot brief."
#
#   social-strategist emits TREND-RIDE actions like
#     "Trend-ride #coldplunge on CB247 socials — 10 hits this week"
#   That's a directive. Joanne reads it and has to: pick an angle, ask
#   Shauna for assets, write the caption, build hashtag stack, schedule.
#   Same for ADAPT archetypes ("Adapt high-engagement format").
#
#   This drafter converts every trend-ride/amplify action into a ready
#   artefact:
#     - 3 caption variations targeting that hashtag/format
#     - CB247-relevant angle that ties the trend to a differentiator
#     - Hashtag stack (target tag + 4-6 supporting tags + CB247 brand)
#     - 1-2 shot brief directions for Shauna (composition + format)
#     - Posting time recommendation
#     - Brand voice + compliance check
#
#   Joanne's action becomes "Schedule + post #coldplunge reel — assets
#   needed" with everything attached. Shauna's "shoot" task is inside
#   the same brief — no separate emission needed.
#
# PAIRS WITH
#   - scripts/phases/phase1c_content_drafter.sh — fires this agent
#   - scripts/work_queue/find_pending_trend_rides.py — discovery
#   - scripts/render_content_html.py — renders .md → .html for preview
#
# COST
#   ~$0.10-0.20 per draft. Typical week: 4-8 trend-rides → $0.40-1.60/week.
#
# FUTURE: when state/asset-library.json exists (extracted from Wave 4
# hardcoded data), branch: if matching assets present → "Schedule +
# post" only; if no match → emit separate Shauna shoot brief.
# ────────────────────────────────────────────────────────────────────────────

tools: Read(state/work-queue.json), Read(state/apify-data.json), Read(state/social-trends.json), Read(state/metricool-data.json), Read(context/brand-voice.md), Read(context/icp-profiles.md), Read(context/psychology-triggers.md), Read(context/team-workflow-mapping.md), Read(/Users/tiachasingbetter/Documents/ChasingBetter/CB_Brain/wiki/CB247-Knowledge-Base.md), Write(outputs/trend-rides/**)

context:
  - state/work-queue.json
  - state/apify-data.json            # trend hashtags + top posts data
  - state/social-trends.json
  - state/metricool-data.json        # CB247's own engagement context
  - context/brand-voice.md
  - context/icp-profiles.md
  - context/psychology-triggers.md
  - context/team-workflow-mapping.md
  - CB_Brain/wiki/CB247-Knowledge-Base.md

Inputs:
  target_action_id: "<set at invocation>"

CB247_Brand_Anchors:
  price: "$11.95/wk"
  no_lock_in: "No lock-in. Cancel any time."
  locations: ["Malaga", "Ellenbrook"]
  differentiators:
    - "Kids Hub (supervised play)"
    - "24/7 access"
    - "Traditional Sauna + Ice Bath (Recovery)"
    - "FIFO-friendly freeze"
    - "Reformer Pilates"
    - "ChasingRX (functional training)"
  banned_phrases:
    - "only gym with"
    - "best gym"
    - "guaranteed"
    - "burns fat"
    - "detox"
    - "heals / cures"
  forbidden_competitor_mentions: ["Revo", "Anytime", "Snap", "Ryderwear", "Fitstop"]
  voice: "Direct. Confident. Warm. Talk to a Perth local making a decision this week."

Trend_Ride_Spec_Rules:
  caption_max_chars: 220               # IG/TikTok sweet spot (truncates at 125 in feed)
  caption_variations: 3
  hashtag_count: 6                     # target tag + 5 supporting (incl. local + brand)
  shot_brief_directions: 2             # primary + alt
  required_local_tag: ["#malagagym", "#ellenbrookgym", "#perthgym"]  # pick 1
  required_brand_tag: "#chasingbetter247"

Workflow:
  - name: find-target-action
    description: |
      Read state/work-queue.json. Find action where id == target_action_id.
      Confirm source_page == 'organic-social' AND title matches one of:
        - "Trend-ride #<tag>" — extract the hashtag
        - "Adapt high-engagement <format>" — extract the format (Tiktok / Instagram / Reel etc.)
      Extract title, description, hashtag/format hint.
    output: "(held internally)"

  - name: angle-match
    description: |
      Map the trend (hashtag or format) to the strongest CB247
      differentiator. Examples:
        #coldplunge → Sauna + Ice Bath (Recovery add-on)
        #gymtok / #fitnessjourney → ChasingRX or 24/7 access
        #gymmotivation → community / before-after / member story
        Tiktok dance format → playful Kids Hub / community moment
        Instagram carousel → before-after or 3-step guide format
      If no clear differentiator match → mark "skip — drift risk".
      Output: chosen angle + which CB247 differentiator it ties to.
    output: "(held internally)"

  - name: draft-caption-variations
    description: |
      Draft 3 caption variations (each ≤220 chars). Each:
        - Opens with the hook (no warmup)
        - Ties the trend hashtag/format to CB247's angle
        - Includes $11.95/wk + "no lock-in" OR a key differentiator
        - Ends with implicit CTA
        - Different psychological trigger (identity / problem / proof)
      Examples for #coldplunge:
        A: "Cold plunge culture goes hard. So does ours. Sauna + Ice Bath
            recovery in Malaga + Ellenbrook. $11.95/wk."
        B: "When the plunge hits different. CB247's traditional sauna
            + ice bath setup, included as a Recovery add-on. Recovery
            isn't a luxury — it's training."
        C: "Perth locals: this is what your post-workout reset looks
            like. Sauna. Ice. Done. ChasingBetter247."
    output: "(held internally)"

  - name: hashtag-stack
    description: |
      Build 6-hashtag stack:
        1. Target trend tag (#coldplunge / #gymtok / etc.)
        2-3. Niche supporting (#coldplungerecovery #icebath #recoveryday)
        4. Required local tag (#malagagym OR #ellenbrookgym OR #perthgym)
        5. CB247 brand tag (#chasingbetter247)
        6. One brand-extension tag (#alwaysbetter / #fittingperth)
      Avoid: #fitness #gym (too broad, no local surface).
    output: "(held internally)"

  - name: shot-brief
    description: |
      Write 1-2 shot brief directions for Shauna. Each direction = 30-50 words.
      Specify:
        - Subject (what's in frame)
        - Composition (POV / wide / close / over-shoulder)
        - Lighting (natural / studio / golden hour)
        - Format (9-sec Reel / 15-sec Story / static carousel image)
        - Mood (energetic / serene / playful)
        - Why it ties to the trend angle
      Example for #coldplunge:
        Direction 1: "POV from inside the ice bath: hand reaching for the
        sauna door, steam visible. 9-sec Reel. Cool blue tones into warm
        amber transition. Conveys the contrast therapy story. Hits the
        traditional-sauna differentiator."
        Direction 2: "Close-up of feet entering the plunge, water visible.
        Member's face crops in last frame, relieved. 15-sec Story. Natural
        light, raw aesthetic. Authentic-not-polished mood matches trend."
    output: "(held internally)"

  - name: posting-time
    description: |
      Recommend posting window based on trend velocity:
        - Hot trend (viral window closing <7d) → next 48h
        - Medium trend → next Tuesday or Thursday 6-9pm AWST
        - Seasonal trend → align with seasonal-calendar
    output: "(held internally)"

  - name: brand-voice-check
    description: |
      Final pass over all 3 captions + hashtag stack:
        - Banned phrases (each variation)
        - Competitor names
        - Price stated correctly
        - Add-ons NOT bundled in $11.95
        - Char counts under limit
        - Local tag present
      Mark each ✅ or flag for Angela.
    output: "(held internally)"

  - name: write-output
    description: |
      Write the full draft to outputs/trend-rides/{slug}.md using the
      Write tool. Slug = slugify(action.title).

      Front-matter YAML:
        action_id: <target_action_id>
        action_title: <title>
        trend_tag: <hashtag or format>
        cb247_angle: <chosen differentiator tie-in>
        posting_time: <recommended window>
        generated_at: <today>
        generated_by: "trend-ride-drafter"

      Body sections:
        1. The angle (1-line summary)
        2. 3 caption variations (each in code block + char count + trigger)
        3. Hashtag stack (6 tags, copy-ready as space-separated string)
        4. Shot brief (1-2 directions for Shauna — 30-50 words each)
        5. Posting time recommendation
        6. Brand voice check (✅/flags)
        7. Joanne's checklist:
           - [ ] Brief Shauna on shot direction (use direction #1 unless she suggests alt)
           - [ ] Wait for assets in Asset Library
           - [ ] Pick winning caption (A/B/C)
           - [ ] Paste into Metricool / post to IG/TikTok
           - [ ] Schedule for [recommended time]
           - [ ] Mark action Done in dashboard

      Then output a SHORT stdout summary: trend tag · angle · compliance
      check · notes for Shauna · notes for Angela.

      CRITICAL: Do NOT emit a proposed_actions JSON block.
    output: "outputs/trend-rides/{slug}.md + stdout summary"

End: "TREND-RIDE DRAFTER COMPLETE — markdown draft written to outputs/trend-rides/{slug}.md"
