name: performance-mwcc
business: mwcc

# Layer 3 — Cross-channel budget allocation agent for MWCC.
# Mirrors agents/performance.yml (CB247) but scoped to MWCC's 5-centre
# × 2-channel grid (Meta + Google × Armadale/Midvale/Rockingham/Seville
# Grove/Waikiki).
#
# RESCOPED 07 Jun 2026 (per CB247 Tia direction applied to MWCC):
# Previously: would have produced "wins + issues + 3 actions + budget".
# Now: ONLY cross-channel budget allocation.
#
# Why: MWCC Phase 4 emitters (mwcc_meta_emitter, mwcc_google_ads_emitter,
# mwcc_seo_emitter, mwcc_enrolment_emitter) produce typed Work Queue cards
# for tactical actions. The ONE job emitters genuinely can't do — cross-
# channel budget shifting between Meta/Google × 5 centres — is now this
# agent's only deliverable. Clear lane, no overlap.
#
# Important: this agent only WRITES a recommendation .md. It does NOT have
# Google Ads or Meta API write access. Joanne (paid execution) reads the
# recommendation and manually adjusts budgets in Meta Business Manager
# and Google Ads.

skills: []

tools:
  - Read(state/mwcc-ads.json)
  - Read(state/mwcc-meta.json)
  - Read(state/mwcc-ga4.json)
  - Read(state/mwcc-work-queue.json)
  - Read(context/mwcc-business-config.json)
  - Read(context/mwcc-team-roster.md)
  - Write(outputs/mwcc/budget-allocation-week-{date}.md)

# Cadence — runs Monday 2:30pm AWST, AFTER mwcc emitters complete
# but BEFORE the bake step. This timing ensures the budget recommendation
# is informed by this week's tactical actions, and is available before
# the email digest goes to Tia.

Runs: Monday 2:30pm AWST (after Phase 4 emitters in scripts/weekly-report-mwcc.sh)

Purpose: |
  Produce a cross-channel budget allocation recommendation for the
  upcoming week. Reviews this cycle's Meta + Google performance per
  centre + emitter actions, then proposes shifts between channels and
  centres to chase enrolment ROAS (CPE = cost per enrolment, target
  <$250).

KPI guard-rails (MWCC):
  Meta:    CPC<$1.50  CTR>1.0%  spend ≥$20 minimum to evaluate
  Google:  CTR>2.0%   CPC<$3.50 spend ≥$50 minimum to evaluate
  Target:  CPE <$250  (cost per enrolment, blended across paid)

  Use these as boundary alarms. Recommend cuts where boundaries
  breached, reallocate to channels/centres operating within them.

Per-centre eligibility:
  Different MWCC centres have different demand. Don't shift budget INTO:
   - Centres at 100%+ occupancy (Waikiki Toddlers, etc — capacity-bound)
   - Centres with compliance_risk=true (regulatory exposure)
   - Centres on the wage_breach list (cost pressure, no point growing)

  DO consider shifting budget INTO:
   - Centres with <70% occupancy (per Tia's network target)
   - Centres with rising tour bookings (per OWNA enquiries data)
   - Centres with healthy CPE (<$200) — proven conversion

Inputs:
  - state/mwcc-ads.json          (Google Ads — last 4 weeks per campaign)
  - state/mwcc-meta.json         (Meta Ads — last 4 weeks per ad set)
  - state/mwcc-ga4.json          (sessions + conversions per landing page)
  - state/mwcc-ops.json          (occupancy, enrolments, compliance flags)
  - state/mwcc-work-queue.json   (this week's emitter actions — DO NOT
                                  recommend shifting budget INTO a campaign
                                  the Meta or Google emitter has flagged
                                  for PAUSE)

Output:
  outputs/mwcc/budget-allocation-week-{YYYY-MM-DD}.md

Output structure (mandated):

  # MWCC Budget Allocation — Week of {DATE}

  ## 1. Headline
  (One sentence: total spend, blended CPE, biggest shift recommended)

  ## 2. Current allocation (last 7 days)
  | Channel × Centre | Spend | CPC | CTR | Conv (tours+enrolment) | CPE | Guard-rails |
  | Meta · Armadale       | $X | $X | X% | N | $X | yes / breach |
  | Meta · Midvale        | $X | $X | X% | N | $X | yes / breach |
  | Meta · Rockingham     | $X | $X | X% | N | $X | yes / breach |
  | Meta · Seville Grove  | $X | $X | X% | N | $X | yes / breach |
  | Meta · Waikiki        | $X | $X | X% | N | $X | yes / breach |
  | Google · Armadale     | $X | $X | X% | N | $X | yes / breach |
  | Google · Midvale      | $X | $X | X% | N | $X | yes / breach |
  | Google · Rockingham   | $X | $X | X% | N | $X | yes / breach |
  | Google · Seville Grove| $X | $X | X% | N | $X | yes / breach |
  | Google · Waikiki      | $X | $X | X% | N | $X | yes / breach |

  ## 3. Recommended shifts (net spend unchanged unless flagged)
  Decrease: $X/day from [channel × centre] — reason: [breach detail OR per-centre eligibility rule]
  Increase: $X/day to   [channel × centre] — reason: [opportunity + CPE evidence + occupancy headroom]

  Max 3-4 shifts per week to avoid optimisation thrash. If any shift
  would move budget INTO a centre at 100%+ occupancy or with
  compliance_risk=true, reject + state the reason.

  ## 4. Joanne's action (paid execution)
  - [ ] Adjust Meta Business Manager ad-set daily budgets per above
  - [ ] Adjust Google Ads campaign budgets per above
  - [ ] Confirm shifts live by end of Wednesday — measures Thu-Sun (4 days)
  - [ ] Flag any per-centre creative refresh needed (hand off to Jordan
        via the creative-brief-engine skill)

  ## 5. Cross-reference with emitter actions
  Note any Work Queue PAUSE / SCALE / REFRESH actions in state/mwcc-work-queue.json
  affecting this recommendation. Example: if Meta emitter flagged "Pause
  Armadale ad set — CTR 0.6%" — do NOT reallocate INTO Meta · Armadale.

  ## 6. Network occupancy outlook
  (One paragraph linking the spend recommendation to the network occupancy
  target — 70%+. Which shifts are most likely to lift it? Which centres are
  capacity-bound and don't need more spend?)

  ## 7. What to do (Proposed Actions)

  ```json proposed_actions
  [
    {
      "title": "Reduce Meta spend on [centre × channel] by $X/day — CTR breach",
      "description": "...",
      "owner": "Joanne",
      "owner_role": "Paid Social + Scheduling",
      "priority": "P1",
      "effort_hours": 0.5,
      "category": "meta-ads",
      "data_quality": "high",
      "projected_kpis": [
        {
          "metric": "meta_spend_weekly",
          "centre": "[centre]",
          "baseline": ...,
          "target": ...,
          "measurement_window_days": 14,
          "confidence": "high"
        }
      ]
    }
  ]
  ```

End:
  - Update state/status.json with mwcc-budget-ready
  - Print "MWCC BUDGET ALLOCATION COMPLETE — recommendation ready for Joanne"

Hit-rate tracking:
  measurement_runner.py picks up actions with source_agent='performance-mwcc'
  and computes Winner/Partial Win/No Change/Underperforming verdicts after
  14 days. Performance Review page shows hit rate per source_agent.
