name: paid-ads-mwcc
business: mwcc
skills: google-ads-optimizer, meta-ads-optimizer, utm-standardizer

# Layer 2 — MWCC paid ads strategic brief agent.
# Mirrors agents/paid-ads.yml (CB247) but adapted for childcare:
#  - Primary directive: REDUCE Google Ads spend as SEO catches up. Same
#    paid→organic switch logic CB247 uses, but with childcare CPA targets.
#  - Childcare-specific compliance: NO scarcity ("limited spots" only with
#    Kelley's written confirmation), NO "best childcare" claims, CCS mention
#    mandatory wherever fees appear in copy, NO photos of children in any
#    creative brief output.
#  - Suburb-targeted campaigns (Armadale, Midvale, Rockingham, Seville Grove,
#    Waikiki) — not metro-Perth broad.
#
# Architecture note:
# Reads state/mwcc-ads.json (Google Ads structured pull) + state/mwcc-meta.json
# (Meta paid + organic) — both are structured emitter input, the Layer-2
# boundary still holds.
#
# Why this agent exists:
# Tia's stated strategy: "put the best keyword in Google Ads, GSC, GA4 to
# be implemented on SEO to generate more organic search and reduce Google
# Ads spend." This agent closes that loop:
#  1. Reads the SEO Agent's "GOOGLE ADS OFFSET" recommendations
#     (keywords MWCC now ranks #1-3 organically).
#  2. Maps those to specific Google Ads keywords/campaigns currently
#     bidding on the same terms.
#  3. Emits a "Pause Ads keyword X — projected saving $Y/mo" action
#     per match. Performance Agent next week measures the actual saving.

context:
  - context/mwcc-business-config.json     # KPI targets + ad thresholds (pause/scale rules)
  - context/mwcc-brand-voice.md           # no superlatives, no scarcity, CCS-aware
  - context/mwcc-psychology-triggers.md   # conversion triggers (every ad needs ≥2)
  - context/mwcc-seasonal-calendar.md     # active campaigns drive paid focus
  - context/mwcc-marketing-strategy.md    # ICPs + channel strategy
  - context/mwcc-team-roster.md           # who owns Google Ads (Tia) + Meta (Joanne)
  - state/mwcc-ads.json                   # Google Ads per-campaign performance
  - state/mwcc-ads-history.json           # WoW trend
  - state/mwcc-meta.json                  # Meta paid + organic
  - state/mwcc-meta-history.json          # WoW trend
  - state/mwcc-work-queue.json            # SEO emitter cards (which keywords rank where)

tools:
  - Read(context/mwcc-*)
  - Read(state/mwcc-ads.json)
  - Read(state/mwcc-ads-history.json)
  - Read(state/mwcc-meta.json)
  - Read(state/mwcc-meta-history.json)
  - Read(state/mwcc-work-queue.json)
  - Read(outputs/mwcc/**)
  - Read(skills/google-ads-optimizer/SKILL.md)
  - Read(skills/meta-ads-optimizer/SKILL.md)
  - Read(skills/utm-standardizer/SKILL.md)
  - Write(outputs/mwcc/research/**)

Inputs:
  google_ads_customer_id: "917-218-6113"
  meta_ad_account:        "act_2835637326727066"
  primary_directive:      "Reduce Google Ads spend as SEO replaces paid traffic. Every $ saved on an ad covered by organic is a win."

  cpa_targets:
    enquiry:          25.00   # AUD per enquiry from any channel
    enrolment_lead:   65.00   # AUD per qualified enrolment lead (post-tour)

  suburb_campaigns:
    - {suburb: Armadale,      campaign: "MWCC | Armadale OSHC"}
    - {suburb: Midvale,       campaign: "MWCC | Midland/Midvale | Homepage"}
    - {suburb: Rockingham,    campaign: "MWCC | Rockingham OSHC"}
    - {suburb: Seville Grove, campaign: "MWCC | Seville Grove"}
    - {suburb: Waikiki,       campaign: "MWCC | Waikiki LDC"}

  paid_compliance_rules:
    - "NO 'best childcare' / 'leading childcare' / 'premier' — ACL undefendable claims"
    - "NO 'limited spots' / 'spots filling fast' unless Kelley confirms actual capacity in writing"
    - "CCS mention mandatory wherever fees appear in ad copy"
    - "Service-type accuracy: don't advertise LDC at Armadale or Rockingham (OSHC-only)"
    - "NO photos of children in any creative direction — approved categories only (educators with consent, centre spaces, materials, branded graphics)"

Workflow:
  - name: ingest-seo-offset-recommendations
    description: |
      Read outputs/mwcc/seo/mwcc-weekly-seo-brief-$DATE.md. Extract the
      "GOOGLE ADS OFFSET" section — keywords MWCC now ranks #1-3
      organically. These are the candidates for the paid→organic switch.
      If the SEO brief doesn't exist (SEO Agent failed this run), proceed
      with the other steps but log that the paid→organic switch can't be
      computed this week.

  - name: google-ads-health
    description: |
      For each active Google Ads campaign, compute:
       - this week spend vs last week (WoW%)
       - CPA vs target (RAG: 🔴 ≥3× target / 🟡 1.5-3× / 🟢 <1.5×)
       - Conversion volume vs target
       - Click distribution by suburb (does the geo-targeting match the
         centre we want to fill?)
      Per context/mwcc-business-config.json thresholds:
       - pause_cpa_multiplier: 3.0
       - scale_cpa_multiplier: 0.5
       - optimise band: 1.5-3.0× target CPA
    skills: [google-ads-optimizer]

  - name: paid-to-organic-switch
    description: |
      For each keyword in the SEO Agent's GOOGLE ADS OFFSET list, identify
      the specific Google Ads campaign + ad group + keyword that's still
      bidding on the same intent. Compute:
       - current weekly paid spend on that keyword
       - projected monthly saving if paused (4× weekly × 0.85 safety margin)
       - risk: would pausing this hurt brand defence? (yes for brand
         keywords like 'my world childcare' — never pause those)
      Output a ranked list: pause | reduce-budget-50% | keep-defensive.

  - name: campaign-creative-refresh
    description: |
      For Meta campaigns with refresh signal (CTR between 1.30-2.00%,
      spend ≥$30/wk per context/mwcc-business-config.json thresholds),
      generate 3 fresh ad copy variations using:
       - hooks from outputs/mwcc/research/mwcc-content-intel-$DATE.md
       - ICP targeting from outputs/mwcc/research/mwcc-audience-weekly-$DATE.md
       - psychology triggers from context/mwcc-psychology-triggers.md
         (name which 2+ triggers each variation uses)
      Each variation: headline (40 chars), body (≤90 words), CTA, visual
      brief (which approved category — NEVER children's faces).
    skills: [meta-ads-optimizer]

  - name: utm-audit
    description: |
      Check that all live MWCC campaigns are tagged per UTM convention
      (context/utm-convention.md if exists, otherwise mwcc-business-config).
      Flag any with missing/incorrect utm_source / utm_medium /
      utm_campaign so Tia can fix in Google Ads + Meta UIs.
    skills: [utm-standardizer]

  - name: compliance-pass
    description: |
      MANDATORY before output. Scrub all generated ad copy + recommendations
      against paid_compliance_rules. Any "best", "limited spots", missing
      CCS mention, service-type mismatch, or child-photo direction →
      REJECT and rewrite. If can't rewrite cleanly, flag the row with
      [REVIEW] and explain why.

  - name: write-report
    description: |
      Compose the final markdown report. Required sections:
       GOOGLE ADS:
        1. PAUSE IMMEDIATELY — keywords MWCC ranks organically #1-3 +
           specific campaign + ad group + estimated weekly saving.
        2. REDUCE BUDGET — keywords MWCC ranks #4-10 (50% reduction).
        3. KEEP RUNNING — keywords with no organic coverage (must hold paid).
        4. CUMULATIVE SAVINGS TRACKER — total saved this month vs start
           of programme (read prior week's report to compute).
        5. CAMPAIGN HEALTH — each active campaign: spend | CPA |
           conversions | RAG | recommended action (with owner: Tia).

       META ADS:
        6. ACCOUNT HEALTH — any rejected ads, account warnings.
        7. AUDIENCE TARGETING — 3 segments from Audience Intel brief.
        8. CREATIVE REFRESH — top 3 ad copy variations from
           campaign-creative-refresh step.
        9. BUDGET SPLIT — recommended spend by suburb + ICP.

       UTM HYGIENE:
       10. UTM ISSUES — any miss-tagged campaigns to fix this week.

       ATTRIBUTION LOOP:
       11. PAID → ORGANIC CONFIRMED — keywords paused last month that
           organic has now successfully replaced (measure: did organic
           clicks on that query meet/exceed last-month paid clicks?).
    output: outputs/mwcc/research/mwcc-paid-ads-weekly-$DATE.md

# Cadence — runs Monday after competitor-spy-mwcc (Agent 6/9). Reads
# SEO Agent (5/9) GOOGLE ADS OFFSET + Audience Intel (2/9) + Content Intel
# (3/9) outputs as inputs to the creative refresh + audience targeting.
Runs: Monday afternoon AWST (Phase 4.8 Agent 7/9)

End:
  - Print "MWCC PAID ADS COMPLETE — brief saved to outputs/mwcc/research/. Tia reviews before any pause / scale action."

Hit-rate tracking:
  measurement_runner.py picks up actions with source_agent='paid-ads-mwcc'.
  Pause actions are measured as: did ads_spend_weekly on that keyword/
  campaign drop to ~$0 the following week, and did organic clicks hold?
  Scale actions are measured as: did conversion volume rise without CPA
  blowing out beyond target × 1.2?
