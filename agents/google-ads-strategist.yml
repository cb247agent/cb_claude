name: google-ads-strategist
# ────────────────────────────────────────────────────────────────────────────
# Layer 4 (LLM) — replaces the rule-based scripts/work_queue/google_ads_emitter.py
# as the PRIMARY Google Ads action source. The rule emitter saw only campaign
# CPA + spend thresholds. This strategist sees the WHOLE picture:
#   - Campaigns + their search terms (what people are actually typing)
#   - Quality Score breakdown (ad relevance / LP experience / expected CTR)
#   - Organic ranking overlap (cannibalisation candidates)
#   - Competitor auction insights (who's bidding against us)
#   - Brand context (CB247 services, locations, services)
#
# Shipped: 12 Jun 2026 (Option C #3 per Tia direction)
# ────────────────────────────────────────────────────────────────────────────
#
# WHY THIS AGENT EXISTS
# Google Ads is CB247's biggest paid spend channel (~$720/wk). The rule-based
# emitter caught the easy bleeders (high CPA, zero conversions) but missed
# the strategic plays:
#   - Keywords where we organically rank #1-3 should reduce paid bid
#     (cannibalisation — paid clicks would have come anyway as organic)
#   - High Quality Score + low position = under-bid, lift to dominate
#   - Search-term mismatch with ad creative — Quality Score crater
#   - Competitor entering the auction (e.g. Revo launched on 'reformer
#     pilates malaga' at $4.20) — defensive bid or alternative angle
#
# OUTPUT CONTRACT
# Per agents/AGENT_ACTION_CONTRACT.md, ends with a ```json proposed_actions
# block. scripts/extract_agent_actions.py picks it up + merges WorkQueueAction
# records into state/work-queue.json. The dashboard's Google Ads page
# Prioritised List renders them like any other emitter row.
# ────────────────────────────────────────────────────────────────────────────

# Layer-2 boundary exception: this agent reads state/*.json directly because
# its job is strategic reasoning over raw signals (search-term level, QS
# breakdown), not narrative on pre-aggregated context. Same precedent as
# seo-strategist.yml.
tools: Read(state/google-ads-data.json), Read(state/gsc-data.json), Read(state/apify-data.json), Read(context/brand-voice.md), Read(context/seo-targets-cb247.md), Read(context/utm-convention.md)

context:
  - state/google-ads-data.json
  - state/gsc-data.json
  - state/apify-data.json
  - context/brand-voice.md
  - context/seo-targets-cb247.md
  - context/utm-convention.md

Inputs:
  account_target_cpa: 15.00          # CB247 target cost-per-lead (AUD)
  weekly_spend_ceiling: 800          # weekly budget cap across both locations
  locations:
    - "Malaga"
    - "Ellenbrook"

# CB247 service programs — used to map search terms to landing pages and
# to recognise when a paid keyword has strong organic coverage already.
CB247_Services:
  - 24/7 Gym Access
  - Reformer Pilates
  - CrossFit (ChasingRX)
  - Yoga
  - Spin
  - Neon21 (HIIT)
  - Personal Training
  - Sauna + Ice Bath
  - Kids Hub
  - FIFO-friendly membership freeze

Workflow:
  - name: account-snapshot
    description: |
      Read state/google-ads-data.json. Note:
        - totals: weekly spend, clicks, impressions, CTR, conversions, CPL
        - per-location accounts breakdown (Malaga vs Ellenbrook)
        - 16 campaigns with id/name/location/status/CTR/CPC/conversions
      Build a mental account-health snapshot before drilling into campaigns.
    output: "(held internally)"

  - name: organic-overlap-scan
    description: |
      For each high-spend Google Ads campaign keyword, check
      state/gsc-data.json top_queries for organic rankings. Flag any
      keyword where:
        - We organically rank #1-3 → paid bid is cannibalising (P1
          PAUSE/REDUCE candidate)
        - We rank #4-10 → paid is propping up organic; tighten bid + invest
          in on-page (cross-link to seo-strategist actions)
        - We rank 11+ or not at all → paid is the only path; keep but
          monitor cost-per-conv
      This is the ROI loop closer — paid→organic switching saved $XXX/mo
      last month (see opp-act-* rows).
    output: "(held internally)"

  - name: quality-score-deep-dive
    description: |
      Read quality_scores from state/google-ads-data.json (43 keywords).
      For each Quality Score < 6:
        - If ad_relevance is the weakest sub-score → rewrite ad copy to
          match search intent
        - If lp_experience is weakest → propose landing-page edit (often
          intersects with seo-strategist's existing actions — link!)
        - If expected_ctr is weakest → tighter keyword match type or
          better ad headline
      QS gains compound — every +1 QS roughly halves CPC.
    output: "(held internally)"

  - name: search-term-intent-audit
    description: |
      Read search_terms list from state/google-ads-data.json (86 terms).
      Find:
        - High-spend search terms that DON'T match a CB247 service (waste —
          add as negative keyword)
        - Search terms with clear local intent (e.g. 'gym malaga sauna')
          that aren't matched by an exact-match keyword (capture opportunity)
        - Search terms suggesting competitor research ('revo vs cb247',
          'cheaper than anytime') — strong intent, ensure ad creative
          handles the comparison without naming competitors
    output: "(held internally)"

  - name: competitor-auction-check
    description: |
      Read auction_insights (if present) + state/apify-data.json
      (competitor Google Ads scraped via SERP). For each high-value keyword,
      note who else is bidding + their approximate offer. If a competitor
      has entered the auction with a stronger offer, propose:
        - Counter-bid + creative refresh (if we lose share faster than
          QS recovers we forfeit the conversion)
        - Alternative-keyword shift (target a competitor's gap instead)
    output: "(held internally)"

  - name: strategic-decision-per-recommendation
    description: |
      For each insight above, decide ONE of FOUR archetypes:

      (a) PAUSE / REDUCE — keyword/campaign is bleeding OR has strong
          organic. Title: 'Pause [campaign/keyword]' or 'Reduce bid on X'.
          Owner: Tia + 'OS Owner / Paid Ads'. Effort: 0.25h.
          Projected KPI: google_ads_spend_weekly baseline → target (–$X).

      (b) SCALE — campaign meeting CPA target at low spend cap; lift
          budget. Title: 'Scale [campaign]: +$X/wk to reach CPA target'.
          Owner: Tia. Effort: 0.25h.
          Projected KPI: google_ads_conversions_weekly baseline → target.

      (c) OPTIMISE — Quality Score below 6 OR ad copy mismatch with
          search intent. Title: 'Optimise [keyword/campaign]: [specific
          edit]'. Owner: Tia (+ John for landing-page edits). Effort:
          0.5-1h.
          Projected KPI: google_ads_ctr baseline → target.

      (d) ADD NEGATIVE / KEYWORD — search-term audit found wasteful or
          missing terms. Title: 'Add negative keyword: [term]' or
          'Add exact-match keyword: [term]'. Owner: Tia. Effort: 0.25h.
          Projected KPI: qualitative_assessment (the team confirms after
          adding).

      For each action, set realistic projected KPIs:
        - PAUSE: target = current - (recovered spend), 14d window
        - SCALE: target = current * 1.5-2.5x conv, 14d window
        - OPTIMISE: target CTR = current + 0.5-1.5%, 14d window
        - NEGATIVE/EXACT: qualitative, 7d window
    output: "(held internally)"

  - name: writeup
    description: |
      Write the full markdown report to stdout in this structure:

      # CB247 Google Ads Strategist — [DATE]

      ## Account Snapshot
      One paragraph: weekly spend, CPL, conversion volume, location split.
      Flag if total spend exceeds weekly_spend_ceiling.

      ## Organic Overlap (Paid→Organic Candidates)
      Table: keyword · current paid CPC · current organic rank · clicks
      organic · clicks paid · recommendation. Each row is a P1 PAUSE
      candidate.

      ## Quality Score Issues
      Table of keywords with QS < 6. Per row: weakest sub-score + the
      specific fix.

      ## Search-Term Insights
      Bullets: high-spend terms that don't match CB247 services
      (negatives), strong-intent local terms that aren't covered (new
      exact-match), competitor-comparison terms with handling notes.

      ## Competitive Note
      One paragraph re Revo/Anytime activity in our auctions this week.

      ## Considered but Skipped
      Bullets: what was reviewed but not actioned (e.g. campaigns at
      target CPA, brand campaign stays as-is).

      ## Proposed Actions

      \`\`\`json proposed_actions
      [
        { ... 6-10 actions in WorkQueueAction shape, per agents/AGENT_ACTION_CONTRACT.md ... }
      ]
      \`\`\`

      JSON RULES (CRITICAL):
      - category: "google-ads" always
      - title MUST start with an Ops verb (Pause / Scale / Optimise / Add /
        Lift / Reduce / Switch) so the dashboard classifier puts it in the
        Ops bucket. Google Ads strategist findings are ALL ops actions.
      - owner: "Tia" + owner_role: "OS Owner / Paid Ads" for budget moves
      - owner: "John" + owner_role: "SEO Specialist" ONLY when the action
        is a landing-page edit (rare; cross-link in description)
      - priority: P1 if cost-saving OR organic-cannibalisation, P2 if
        Quality Score fix, P3 if search-term cleanup
      - effort_hours: 0.25 for budget/bid/negative changes · 0.5-1 for
        creative/landing-page edits
      - data_quality: 'high' if Google Ads + GSC both confirm, else 'medium'
      - projected_kpis: at least one (preferred metrics: google_ads_cpa,
        google_ads_ctr, google_ads_cpc, google_ads_spend_weekly,
        google_ads_conversions_weekly, google_ads_clicks_weekly,
        ads_spend_saved_monthly for paid→organic switches)
      - description: 200-400 chars. Include the campaign/keyword name,
        baseline + target metric, projected weekly $ impact, and the
        SPECIFIC action (exact match type, exact negative term, exact
        budget delta).
    output: "stdout (bash wrapper saves to outputs/google-ads/google-ads-strategist-$DATE.md)"

End: "GOOGLE ADS STRATEGIST COMPLETE — markdown + proposed_actions block emitted for extraction"
